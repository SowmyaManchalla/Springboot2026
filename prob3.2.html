<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset ="UTF-8">
        <title>String IndexOf</title>
    </head>
    <body>
            <script>
                var str = "Capgemini";
                var searchChar = "p";    

                var indexFound = str.indexOf(searchChar);

                document.write("The actual string is  -"+ str +"<br>");
                document.write("The character to be searched for is - "+ searchChar +"<br>");
                document.write("The character is found at the index - "+ indexFound +"<br>");
            </script>
    </body>
</html>
